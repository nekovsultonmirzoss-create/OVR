<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kimyo OVR">
<meta name="theme-color" content="#0a0e1a">
<title>Kimyo OVR</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a; --surface:#111827; --card:#1a2235; --border:#2a3a55;
  --accent1:#00d4ff; --accent2:#ff6b35; --accent3:#39ff14; --accent4:#bf5af2;
  --text:#e8f0fe; --muted:#6b7fa3; --correct:#39ff14; --wrong:#ff3060; --gold:#ffd700;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 80% 50% at 20% 10%,rgba(0,212,255,.06) 0%,transparent 60%),
  radial-gradient(ellipse 60% 40% at 80% 90%,rgba(191,90,242,.06) 0%,transparent 60%);
  pointer-events:none;z-index:0;}
.wrap{max-width:900px;margin:0 auto;padding:16px;position:relative;z-index:1;}

/* ===== LOGIN ===== */
#screen-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px 28px;width:100%;max-width:380px;text-align:center;position:relative;overflow:hidden;}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent1),var(--accent4),var(--accent2));}
.login-logo{font-size:3rem;margin-bottom:8px;}
.login-title{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;background:linear-gradient(135deg,var(--accent1),var(--accent4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.login-sub{color:var(--muted);font-size:.8rem;margin-bottom:28px;}
.login-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:1.1rem;text-align:center;outline:none;transition:border-color .2s;letter-spacing:4px;font-weight:700;}
.login-input:focus{border-color:var(--accent1);}
.login-btn{width:100%;margin-top:14px;padding:14px;background:linear-gradient(135deg,var(--accent1),var(--accent4));border:none;border-radius:12px;color:#000;font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:1px;}
.login-btn:hover{transform:scale(1.02);box-shadow:0 0 20px rgba(0,212,255,.4);}
.login-err{color:var(--wrong);font-size:.82rem;margin-top:10px;display:none;}

/* ===== HEADER ===== */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0;margin-bottom:16px;border-bottom:1px solid var(--border);}
.app-header h2{font-family:'Orbitron',monospace;font-size:.9rem;letter-spacing:1px;color:var(--accent1);}
.user-badge{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:.78rem;display:flex;align-items:center;gap:6px;}
.logout-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--muted);font-size:.76rem;cursor:pointer;transition:all .2s;font-family:'Exo 2',sans-serif;}
.logout-btn:hover{border-color:var(--wrong);color:var(--wrong);}

/* ===== TABS ===== */
.tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s;}
.tab-btn.active{border-color:var(--accent1);color:var(--accent1);background:rgba(0,212,255,.08);}

/* ===== STUDENT HOME ===== */
.section-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 14px;cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden;}
.section-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;}
.section-card.c1::before{background:radial-gradient(ellipse at center,rgba(0,212,255,.14),transparent 70%);}
.section-card.c2::before{background:radial-gradient(ellipse at center,rgba(57,255,20,.11),transparent 70%);}
.section-card.c3::before{background:radial-gradient(ellipse at center,rgba(255,107,53,.11),transparent 70%);}
.section-card.c4::before{background:radial-gradient(ellipse at center,rgba(191,90,242,.11),transparent 70%);}
.section-card:hover::before{opacity:1;}
.section-card:hover{transform:translateY(-3px);}
.section-card .icon{font-size:1.8rem;margin-bottom:7px;}
.section-card h3{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:1px;margin-bottom:8px;}
.section-card .score-bar{height:6px;background:var(--border);border-radius:4px;overflow:hidden;margin-top:6px;}
.section-card .score-fill{height:100%;border-radius:4px;transition:width .8s ease;}
.section-card .score-txt{font-size:.72rem;color:var(--muted);margin-top:4px;}
.section-card .not-done{font-size:.7rem;color:var(--wrong);margin-top:4px;}

/* ===== STATS ===== */
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 16px;font-size:.8rem;flex:1;min-width:80px;text-align:center;}
.stat-pill .sv{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;display:block;margin-bottom:2px;}
.stat-pill .sl{color:var(--muted);font-size:.7rem;}
.stat-pill.gold .sv{color:var(--gold);}
.stat-pill.green .sv{color:var(--correct);}
.stat-pill.blue .sv{color:var(--accent1);}
.stat-pill.orange .sv{color:var(--accent2);}

/* ===== GAME ===== */
.game-wrap{animation:fadeIn .3s ease;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px 20px;margin-bottom:14px;position:relative;overflow:hidden;}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent1),var(--accent4),var(--accent2));}
.q-cat{font-size:.65rem;letter-spacing:2px;color:var(--accent1);text-transform:uppercase;margin-bottom:7px;font-family:'Orbitron',monospace;}
.q-text{font-size:clamp(.9rem,2.5vw,1.05rem);line-height:1.6;margin-bottom:6px;}
.q-formula{font-family:'Courier New',monospace;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:10px 13px;margin:9px 0;font-size:.92rem;color:var(--accent1);word-break:break-all;line-height:1.7;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(max-width:480px){.options{grid-template-columns:1fr;}}
.opt-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.86rem;cursor:pointer;transition:all .2s;text-align:left;line-height:1.4;}
.opt-btn:hover:not(:disabled){border-color:var(--accent1);background:rgba(0,212,255,.07);transform:translateX(3px);}
.opt-btn.correct{border-color:var(--correct);background:rgba(57,255,20,.12);color:var(--correct);}
.opt-btn.wrong{border-color:var(--wrong);background:rgba(255,48,96,.10);color:var(--wrong);}
.feedback{padding:12px 15px;border-radius:12px;margin:12px 0 0;font-size:.85rem;line-height:1.5;display:none;}
.feedback.show{display:block;animation:fadeIn .3s ease;}
.feedback.ok{background:rgba(57,255,20,.1);border:1px solid rgba(57,255,20,.3);color:var(--correct);}
.feedback.no{background:rgba(255,48,96,.1);border:1px solid rgba(255,48,96,.3);color:#ff8099;}
.next-btn{display:none;width:100%;margin-top:13px;padding:13px;background:linear-gradient(135deg,var(--accent1),var(--accent4));border:none;border-radius:12px;color:#000;font-family:'Orbitron',monospace;font-size:.86rem;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.next-btn.show{display:block;animation:fadeIn .3s ease;}
.timer-bar{height:4px;background:var(--border);border-radius:4px;margin-bottom:12px;overflow:hidden;}
.timer-fill{height:100%;border-radius:4px;background:var(--accent3);transition:width .1s linear,background .3s;}
.progress-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;height:6px;margin:6px 0 12px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent1),var(--accent4));border-radius:8px;transition:width .5s ease;}
.game-stats{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.g-pill{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:5px 13px;font-size:.78rem;display:flex;align-items:center;gap:5px;}
.g-pill .v{font-family:'Orbitron',monospace;font-weight:700;font-size:.88rem;}
.g-pill.sc .v{color:var(--gold);}
.g-pill.lv .v{color:var(--wrong);}
.g-pill.st .v{color:var(--accent3);}

/* ===== RESULT ===== */
.result-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:34px 26px;text-align:center;}
.result-emoji{font-size:3.2rem;margin-bottom:12px;}
.result-title{font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;margin-bottom:5px;}
.result-pct{font-family:'Orbitron',monospace;font-size:3rem;font-weight:900;color:var(--gold);margin:12px 0;}
.result-stats{display:flex;gap:16px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.rs .rv{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:700;}
.rs .rl{font-size:.7rem;color:var(--muted);margin-top:3px;}

/* ===== TEACHER DASHBOARD ===== */
.teacher-wrap{}
.search-bar{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:11px 15px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.9rem;outline:none;margin-bottom:14px;transition:border-color .2s;}
.search-bar:focus{border-color:var(--accent1);}
.student-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s;}
.student-row:hover{border-color:var(--accent1);transform:translateX(3px);}
.student-row .sname{font-weight:700;font-size:.92rem;margin-bottom:6px;}
.student-row .sid{color:var(--muted);font-size:.72rem;font-family:'Orbitron',monospace;}
.student-row .sbars{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.sbar-item{flex:1;min-width:60px;}
.sbar-item .sbl{font-size:.65rem;color:var(--muted);margin-bottom:3px;}
.sbar-item .sbr{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.sbar-item .sbf{height:100%;border-radius:3px;}
.sbar-item .sbp{font-size:.68rem;margin-top:2px;}
.not-started{color:var(--wrong);font-size:.68rem;}
.overall-pct{font-family:'Orbitron',monospace;font-size:.82rem;font-weight:700;float:right;}

/* student detail */
.detail-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;}
.detail-title{font-family:'Orbitron',monospace;font-size:.85rem;margin-bottom:14px;color:var(--accent1);}
.detail-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.detail-row:last-child{border:none;margin:0;padding:0;}
.detail-icon{font-size:1.4rem;flex-shrink:0;}
.detail-name{font-size:.85rem;font-weight:600;flex:1;}
.detail-bar{flex:2;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.detail-fill{height:100%;border-radius:4px;}
.detail-pct{font-family:'Orbitron',monospace;font-size:.82rem;font-weight:700;min-width:40px;text-align:right;}
.detail-not{color:var(--wrong);font-size:.76rem;}

/* overall leaderboard */
.lb-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.lb-rank{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;min-width:32px;}
.lb-rank.r1{color:var(--gold);}
.lb-rank.r2{color:#c0c0c0;}
.lb-rank.r3{color:#cd7f32;}
.lb-name{flex:1;font-size:.88rem;font-weight:600;}
.lb-pct{font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;}
.lb-bars{display:flex;gap:4px;margin-top:4px;}
.lb-dot{width:10px;height:10px;border-radius:50%;}

/* back btn */
.back-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:8px 16px;color:var(--muted);font-family:'Exo 2',sans-serif;font-size:.82rem;cursor:pointer;transition:all .2s;margin-bottom:14px;}
.back-btn:hover{border-color:var(--accent1);color:var(--accent1);}

/* notif */
.notif{position:fixed;top:16px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 15px;font-size:.86rem;z-index:1000;transform:translateX(120%);transition:transform .3s ease;max-width:250px;}
.notif.show{transform:translateX(0);}
.notif.ok-n{border-color:var(--correct);color:var(--correct);}
.notif.no-n{border-color:var(--wrong);color:var(--wrong);}
.streak-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-family:'Orbitron',monospace;font-size:1.7rem;font-weight:900;color:var(--gold);text-shadow:0 0 28px var(--gold);pointer-events:none;z-index:2000;transition:transform .2s,opacity .5s;opacity:0;}
.streak-flash.show{transform:translate(-50%,-50%) scale(1);opacity:1;}

.btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:10px 18px;color:var(--text);font-family:'Exo 2',sans-serif;font-size:.86rem;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--accent1);color:var(--accent1);}
.btn.primary{background:linear-gradient(135deg,var(--accent1),var(--accent4));border:none;color:#000;font-weight:700;}
.btn-row{display:flex;gap:9px;justify-content:center;margin-top:16px;flex-wrap:wrap;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.screen{display:none;}
.screen.active{display:block;animation:fadeIn .35s ease;}
#screen-login.active{display:flex;}

/* Coeff & continue styles */
.eq-display{font-family:'Courier New',monospace;background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.18);border-radius:10px;padding:14px 16px;margin:10px 0;font-size:.95rem;color:var(--text);line-height:2.2;word-break:break-all;}
.coef-input{display:inline-block;width:46px;background:rgba(255,107,53,.12);border:none;border-bottom:2px solid var(--accent2);border-radius:4px 4px 0 0;color:var(--accent2);font-family:'Courier New',monospace;font-size:.95rem;font-weight:700;text-align:center;padding:2px 4px;outline:none;vertical-align:middle;margin:0 1px;transition:border-color .2s;}
.coef-input:focus{border-bottom-color:var(--accent1);color:var(--accent1);}
.coef-input.ok{border-bottom-color:var(--correct);color:var(--correct);background:rgba(57,255,20,.1);}
.coef-input.no{border-bottom-color:var(--wrong);color:var(--wrong);background:rgba(255,48,96,.1);}
.react-given{font-family:'Courier New',monospace;background:rgba(57,255,20,.07);border:1px solid rgba(57,255,20,.25);border-radius:10px;padding:14px 16px;margin:10px 0;font-size:.95rem;color:var(--accent3);line-height:1.8;}
.prod-rows{display:flex;flex-direction:column;gap:8px;margin:10px 0;}
.prod-row{display:flex;align-items:center;gap:8px;}
.prod-plus{color:var(--muted);font-size:1.1rem;flex-shrink:0;visibility:hidden;}
.prod-row:not(:first-child) .prod-plus{visibility:visible;}
.prod-input{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Courier New',monospace;font-size:.88rem;outline:none;transition:border-color .2s;}
.prod-input:focus{border-color:var(--accent1);}
.prod-input.ok{border-color:var(--correct);background:rgba(57,255,20,.07);color:var(--correct);}
.prod-input.no{border-color:var(--wrong);background:rgba(255,48,96,.07);}
.del-btn{background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:4px 6px;}
.del-btn:hover{color:var(--wrong);}
.add-row-btn{background:none;border:1.5px dashed var(--border);border-radius:8px;padding:7px;color:var(--muted);font-size:1rem;cursor:pointer;width:36px;height:36px;flex-shrink:0;}
.add-row-btn:hover{border-color:var(--accent1);color:var(--accent1);}
.check-btn{background:linear-gradient(135deg,var(--accent2),#ff4500);border:none;border-radius:10px;padding:10px 20px;color:#fff;font-family:'Orbitron',monospace;font-size:.76rem;cursor:pointer;transition:all .2s;font-weight:700;}
.ans-reveal{font-family:'Courier New',monospace;background:rgba(57,255,20,.07);border:1px solid rgba(57,255,20,.2);border-radius:8px;padding:10px 14px;margin-top:8px;font-size:.86rem;color:var(--correct);}
.coef-hint{font-size:.7rem;color:var(--muted);margin-bottom:6px;}
</style>
</head>
<body>
<div class="notif" id="notif"></div>
<div class="streak-flash" id="streak-flash"></div>

<!-- LOGIN -->
<div id="screen-login" class="screen active">

    <div class="login-logo">⚗️</div>

    <input class="login-input" id="login-id" type="tel" placeholder="ID raqamingiz" maxlength="4" inputmode="numeric" pattern="[0-9]*">
    <button class="login-btn" onclick="doLogin()">KIRISH →</button>

</div>

</div>

// ============================================================
// SAVOL BAZASI
// ============================================================

// STORAGE — localStorage asosida
// ============================================================
function getResults(){
  try{return JSON.parse(localStorage.getItem('ovr_results')||'{}');}catch{return {};}
}
function saveResult(sid, sectionId, pct){
  const r=getResults();
  if(!r[sid])r[sid]={};
  if(!r[sid][sectionId]||pct>r[sid][sectionId]){
    r[sid][sectionId]=pct;
    localStorage.setItem('ovr_results',JSON.stringify(r));
  }
}
function getStudentResult(sid, sectionId){
  const r=getResults();
  return r[sid]?.(r[sid][sectionId]??null):null;
}
function getStudentAllResults(sid){
  const r=getResults();
  return r[sid]||{};
}

// AUTH

let currentUser = null;

function doLogin(){
  const raw = document.getElementById('login-id').value.trim();
  const idVal = parseInt(raw);
  const err = document.getElementById('login-err');
  if(!raw || isNaN(idVal)){err.style.display='block';return;}
  if(STUDENTS[idVal]){
    currentUser = {id:idVal, ...STUDENTS[idVal]};
    err.style.display='none';
    document.getElementById('login-id').value='';
    if(currentUser.teacher){
      showScreen('screen-teacher');
      renderTeacher();
    } else {
      showScreen('screen-student');
      document.getElementById('s-name-badge').textContent = currentUser.name.split(' ')[0];
      renderStudentHome();
    }
  } else {
    err.style.display='block';
  }
}
document.getElementById('login-id').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogout(){
  currentUser=null;
  showScreen('screen-login');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// STUDENT — HOME
// ============================================================
function getColor(pct){
  if(pct===null)return '#6b7fa3';
  if(pct>=80)return '#39ff14';
  if(pct>=50)return '#ffd700';
  return '#ff6b35';
}

function renderStudentHome(){
  const res = getStudentAllResults(currentUser.id);
  let totalPct = 0, doneCount = 0;
  SECTIONS.forEach(s=>{if(res[s.id]!=null){totalPct+=res[s.id];doneCount++;}});
  const avg = doneCount>0?Math.round(totalPct/doneCount):0;
  const notDone = SECTIONS.filter(s=>res[s.id]==null).length;

  let html = `
    <div class="stats-row">
      <div class="stat-pill gold"><span class="sv">${avg}%</span><span class="sl">Umumiy</span></div>
      <div class="stat-pill green"><span class="sv">${doneCount}/4</span><span class="sl">Bajarilgan</span></div>
      <div class="stat-pill ${notDone>0?'orange':'green'}"><span class="sv">${notDone}</span><span class="sl">Qolgan</span></div>
    </div>
    <div class="section-grid">
  `;
  SECTIONS.forEach((s,i)=>{
    const pct = res[s.id]??null;
    const col = getColor(pct);
    const cls = ['c1','c2','c3','c4'][i];
    html += `
      <div class="section-card ${cls}" onclick="startGame('${s.id}')">
        <div class="icon">${s.icon}</div>
        <h3>${s.name}</h3>
        <div class="score-bar"><div class="score-fill" style="width:${pct??0}%;background:${col}"></div></div>
        ${pct!==null?`<div class="score-txt" style="color:${col}">${pct}%</div>`:`<div class="not-done">Bajarilmagan</div>`}
      </div>
    `;
  });
  html += '</div>';
  document.getElementById('s-content').innerHTML = html;
}

// GAME ENGINE
// ============================================================
let gState = {};
const TIMER_MAP = {co:20,oxidizers:20,equations:60,continue:90};
const usedIdx = {};

function getShuffled(mode){
  const arr=DB[mode];
  if(!usedIdx[mode])usedIdx[mode]=[];
  const used=usedIdx[mode];
  if(used.length>=arr.length)usedIdx[mode]=[];
  const avail=arr.map((_,i)=>i).filter(i=>!usedIdx[mode].includes(i));
  for(let i=avail.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[avail[i],avail[j]]=[avail[j],avail[i]];}
  const picked=avail.slice(0,Math.min(8,avail.length));
  usedIdx[mode].push(...picked);
  return picked.map(i=>arr[i]);
}

function startGame(mode){
  gState={
    mode,sid:currentUser.id,
    qs:getShuffled(mode),idx:0,
    score:0,lives:3,streak:0,maxStreak:0,
    correct:0,wrong:0,answered:false,
    timer:null,timerMax:TIMER_MAP[mode]
  };
  document.getElementById('s-content').innerHTML = buildGameHTML();
  renderQuestion();
}

function buildGameHTML(){
  return `
    <button class="back-btn" onclick="renderStudentHome()">← Orqaga</button>
    <div class="game-wrap">
      <div class="game-stats">
        <div class="g-pill sc">🏆 <span class="v" id="g-score">0</span></div>
        <div class="g-pill lv">❤️ <span class="v" id="g-lives">3</span></div>
        <div class="g-pill st">🔥 <span class="v" id="g-streak">0</span></div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="g-prog" style="width:0%"></div></div>
      <div class="timer-bar"><div class="timer-fill" id="g-timer" style="width:100%"></div></div>
      <div class="q-card" id="q-card">
        <div class="q-cat" id="q-cat"></div>
        <div class="q-text" id="q-txt"></div>
        <div id="q-body"></div>
        <div class="feedback" id="q-fb"></div>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQ()">KEYINGI →</button>
    </div>
  `;
}

function renderQuestion(){
  clearInterval(gState.timer);
  if(gState.idx>=gState.qs.length||gState.lives<=0){endGame();return;}
  const q=gState.qs[gState.idx];
  gState.answered=false;
  const cats={co:'OKSIDLANISH DARAJASI',oxidizers:'OKSIDLOVCHI/QAYTARUVCHI',equations:'KOEFFITSIENTLAR',continue:'REAKSIYANI DAVOM ETTIR'};
  document.getElementById('q-cat').textContent=cats[gState.mode];
  document.getElementById('q-txt').textContent=q.q;
  document.getElementById('q-fb').className='feedback';
  document.getElementById('next-btn').className='next-btn';
  document.getElementById('g-prog').style.width=(gState.idx/gState.qs.length*100)+'%';
  updateGStats();
  const body=document.getElementById('q-body');body.innerHTML='';
  if(gState.mode==='equations')renderEqQ(q,body);
  else if(gState.mode==='continue')renderContQ(q,body);
  else renderMCQ(q,body);
  startTimer(TIMER_MAP[gState.mode]);
}

// MCQ
function renderMCQ(q,body){
  if(q.formula){const f=document.createElement('div');f.className='q-formula';f.textContent=q.formula;body.appendChild(f);}
  const od=document.createElement('div');od.className='options';
  q.opts.forEach((opt,i)=>{
    const b=document.createElement('button');b.className='opt-btn';b.textContent=opt;
    b.onclick=()=>checkMCQ(i,q);od.appendChild(b);
  });
  body.appendChild(od);
}
function checkMCQ(i,q){
  if(gState.answered)return;gState.answered=true;clearInterval(gState.timer);
  const btns=document.querySelectorAll('.opt-btn');btns.forEach(b=>b.disabled=true);
  if(i===q.ans){
    btns[i].classList.add('correct');
    const bon=10+gState.streak*2;gState.score+=bon;gState.correct++;gState.streak++;
    if(gState.streak>gState.maxStreak)gState.maxStreak=gState.streak;
    showNotif('✅ To\'g\'ri! +'+bon,'ok-n');
    if(gState.streak>=3)showStreakFlash('🔥'+gState.streak+'ta!');
    showFB(true,q.ex);
  }else{
    btns[i].classList.add('wrong');btns[q.ans].classList.add('correct');
    gState.wrong++;gState.lives--;gState.streak=0;
    showNotif('❌ Noto\'g\'ri!','no-n');showFB(false,q.ex);
  }
  updateGStats();document.getElementById('next-btn').className='next-btn show';
}

// EQUATIONS
function renderEqQ(q,body){
  if(q.hint){const h=document.createElement('div');h.className='coef-hint';h.textContent='💡 '+q.hint;body.appendChild(h);}
  const eq=document.createElement('div');eq.className='eq-display';
  q.parts.forEach(part=>{
    if(part.inp){
      const inp=document.createElement('input');
      inp.type='text';inp.className='coef-input';inp.dataset.ans=part.a;inp.maxLength=3;inp.placeholder='?';
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')checkEq(q);});
      eq.appendChild(inp);
    }else{eq.appendChild(document.createTextNode(part.t));}
  });
  body.appendChild(eq);
  const btn=document.createElement('button');btn.className='check-btn';btn.textContent='TEKSHIRISH ✓';btn.onclick=()=>checkEq(q);body.appendChild(btn);
}
function checkEq(q){
  if(gState.answered)return;gState.answered=true;clearInterval(gState.timer);
  const inputs=[...document.querySelectorAll('.coef-input')];
  let allOk=true,correctCount=0;
  inputs.forEach(inp=>{
    inp.disabled=true;
    if(inp.value.trim()===inp.dataset.ans){inp.classList.add('ok');correctCount++;}
    else{inp.classList.add('no');inp.value=inp.dataset.ans;allOk=false;}
  });
  if(allOk){
    const bon=20+gState.streak*3;gState.score+=bon;gState.correct++;gState.streak++;
    if(gState.streak>gState.maxStreak)gState.maxStreak=gState.streak;
    showNotif('✅ Ajoyib! +'+bon,'ok-n');showFB(true,q.ex);
  }else{
    gState.wrong++;if(correctCount===0)gState.lives--;gState.streak=0;
    showNotif(correctCount>0?'⚠️ Qisman':'❌ Noto\'g\'ri!',correctCount>0?'ok-n':'no-n');showFB(false,q.ex);
  }
  updateGStats();document.getElementById('next-btn').className='next-btn show';
}

// CONTINUE
function renderContQ(q,body){
  const rd=document.createElement('div');rd.className='react-given';rd.textContent='📌 '+q.reactant;body.appendChild(rd);
  const rows=document.createElement('div');rows.className='prod-rows';rows.id='prod-rows';
  for(let i=0;i<q.answers.length;i++)addProdRow(rows);
  body.appendChild(rows);
  const ctrl=document.createElement('div');ctrl.style.cssText='display:flex;gap:10px;margin-top:8px;align-items:center;';
  const addBtn=document.createElement('button');addBtn.className='add-row-btn';addBtn.textContent='+';addBtn.onclick=()=>addProdRow(document.getElementById('prod-rows'));
  const chk=document.createElement('button');chk.className='check-btn';chk.textContent='TEKSHIRISH ✓';chk.onclick=()=>checkCont(q);
  ctrl.appendChild(addBtn);ctrl.appendChild(chk);body.appendChild(ctrl);
}
function addProdRow(container){
  const row=document.createElement('div');row.className='prod-row';
  const pl=document.createElement('span');pl.className='prod-plus';pl.textContent='+';row.appendChild(pl);
  const inp=document.createElement('input');inp.type='text';inp.className='prod-input';inp.placeholder='';
  const del=document.createElement('button');del.className='del-btn';del.textContent='✕';del.onclick=()=>{if(container.children.length>1)container.removeChild(row);};
  row.appendChild(inp);row.appendChild(del);container.appendChild(row);
}
function norm(s){return s.trim().toLowerCase().replace(/\s+/g,'').replace(/₂/g,'2').replace(/₃/g,'3').replace(/₄/g,'4').replace(/₅/g,'5').replace(/₆/g,'6');}
function checkCont(q){
  if(gState.answered)return;gState.answered=true;clearInterval(gState.timer);
  const inputs=[...document.getElementById('prod-rows').querySelectorAll('.prod-input')];
  const userAns=inputs.map(i=>norm(i.value)).filter(v=>v.length>0);
  const corrAns=q.answers.map(a=>norm(a));
  let found=0;const matched=new Set();
  userAns.forEach(u=>{const idx=corrAns.findIndex((c,i)=>!matched.has(i)&&c===u);if(idx!==-1){found++;matched.add(idx);}});
  inputs.forEach(inp=>{if(!inp.value.trim())return;inp.classList.add(corrAns.includes(norm(inp.value))?'ok':'no');inp.disabled=true;});
  const reveal=document.createElement('div');reveal.className='ans-reveal';reveal.textContent='✅ To\'g\'ri: '+q.answers.join(' + ');document.getElementById('prod-rows').after(reveal);
  const allOk=found===corrAns.length&&userAns.length===corrAns.length;
  const partial=found>0&&!allOk;
  if(allOk){
    const bon=25+gState.streak*4;gState.score+=bon;gState.correct++;gState.streak++;
    if(gState.streak>gState.maxStreak)gState.maxStreak=gState.streak;
    showNotif('🎉 Ajoyib! +'+bon,'ok-n');showFB(true,q.ex);
  }else{
    gState.wrong++;if(!partial)gState.lives--;gState.streak=0;
    showNotif(partial?'⚠️ '+found+'/'+corrAns.length:' ❌ Noto\'g\'ri!',partial?'ok-n':'no-n');showFB(false,q.ex);
  }
  updateGStats();document.getElementById('next-btn').className='next-btn show';
}

// TIMER
function startTimer(max){
  gState.timerMax=max;gState.timeLeft=max;
  const fill=document.getElementById('g-timer');fill.style.width='100%';fill.style.background='var(--accent3)';
  gState.timer=setInterval(()=>{
    gState.timeLeft--;
    const pct=(gState.timeLeft/gState.timerMax)*100;
    fill.style.width=pct+'%';
    if(pct<40)fill.style.background='var(--accent2)';
    if(pct<20)fill.style.background='var(--wrong)';
    if(gState.timeLeft<=0){clearInterval(gState.timer);if(!gState.answered)timeOut();}
  },1000);
}
function timeOut(){
  gState.answered=true;gState.wrong++;gState.lives--;gState.streak=0;
  showNotif('⏰ Vaqt tugadi!','no-n');
  const q=gState.qs[gState.idx];
  if(gState.mode==='co'||gState.mode==='oxidizers'){
    const btns=document.querySelectorAll('.opt-btn');
    if(btns[q.ans])btns[q.ans].classList.add('correct');btns.forEach(b=>b.disabled=true);
  }else if(gState.mode==='equations'){
    document.querySelectorAll('.coef-input').forEach(i=>{i.disabled=true;i.value=i.dataset.ans;i.classList.add('ok');});
  }else{
    const reveal=document.createElement('div');reveal.className='ans-reveal';reveal.textContent='✅ To\'g\'ri: '+q.answers.join(' + ');const rows=document.getElementById('prod-rows');if(rows)rows.after(reveal);
    document.querySelectorAll('.prod-input').forEach(i=>i.disabled=true);
  }
  showFB(false,q.ex);updateGStats();document.getElementById('next-btn').className='next-btn show';
}
function nextQ(){gState.idx++;renderQuestion();}

function endGame(){
  clearInterval(gState.timer);
  const total=gState.correct+gState.wrong;
  const pct=total>0?Math.round(gState.correct/total*100):0;
  saveResult(gState.sid, gState.mode, pct);

  const secName=SECTIONS.find(s=>s.id===gState.mode)?.name||'';
  let emoji,title;
  if(pct>=90){emoji='🏆';title="A'LO! Kimyochi!";}
  else if(pct>=70){emoji='⭐';title='YAXSHI!';}
  else if(pct>=50){emoji='📚';title="O'RTA";}
  else{emoji='💪';title="Qayta urinib ko'ring";}

  document.getElementById('s-content').innerHTML = `
    <button class="back-btn" onclick="renderStudentHome()">← Asosiy menyu</button>
    <div class="result-box">
      <div class="result-emoji">${emoji}</div>
      <div class="result-title">${title}</div>
      <div style="color:var(--muted);font-size:.8rem;margin-bottom:8px">${secName}</div>
      <div class="result-pct">${pct}%</div>
      <div class="result-stats">
        <div class="rs"><div class="rv" style="color:var(--correct)">${gState.correct}</div><div class="rl">To'g'ri</div></div>
        <div class="rs"><div class="rv" style="color:var(--wrong)">${gState.wrong}</div><div class="rl">Noto'g'ri</div></div>
        <div class="rs"><div class="rv" style="color:var(--gold)">${gState.maxStreak}</div><div class="rl">Max zanjir</div></div>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="renderStudentHome()">MENYU</button>
        <button class="btn" onclick="startGame('${gState.mode}')">QAYTA</button>
      </div>
    </div>
  `;
}

function showFB(ok,text){
  const fb=document.getElementById('q-fb');
  fb.className='feedback show '+(ok?'ok':'no');
  fb.textContent=(ok?'✅ ':'💡 ')+text;
}
function updateGStats(){
  const gs=document.getElementById('g-score');const gl=document.getElementById('g-lives');const gst=document.getElementById('g-streak');
  if(gs)gs.textContent=gState.score;if(gl)gl.textContent=gState.lives;if(gst)gst.textContent=gState.streak;
}

// ============================================================
// TEACHER DASHBOARD
// ============================================================
let tView = 'list'; // list | detail | leaderboard
let tSelectedId = null;

function renderTeacher(){
  const html = `
    <div class="tabs">
      <button class="tab-btn ${tView==='list'||tView==='detail'?'active':''}" onclick="tView='list';tSelectedId=null;renderTeacher()">📋 O'quvchilar</button>
      <button class="tab-btn ${tView==='leaderboard'?'active':''}" onclick="tView='leaderboard';renderTeacher()">🏆 Reyting</button>
    </div>
    <div id="t-main"></div>
  `;
  document.getElementById('t-content').innerHTML=html;
  if(tView==='list')renderTList();
  else if(tView==='detail')renderTDetail();
  else renderTLeaderboard();
}

function renderTList(){
  const results=getResults();
  let html=`<input class="search-bar" id="t-search" placeholder="🔍 Ism yoki ID qidirish..." oninput="filterStudents()">`;
  html+=`<div id="t-student-list">`;
  const sids=Object.keys(STUDENTS).filter(id=>!STUDENTS[id].teacher).map(Number);
  sids.sort((a,b)=>STUDENTS[a].name.localeCompare(STUDENTS[b].name));
  sids.forEach(sid=>{
    const res=results[sid]||{};
    const dones=SECTIONS.filter(s=>res[s.id]!=null);
    const avg=dones.length>0?Math.round(dones.reduce((a,s)=>a+res[s.id],0)/dones.length):0;
    const notDone=SECTIONS.filter(s=>res[s.id]==null);
    const col=getColor(dones.length>0?avg:null);
    html+=`
      <div class="student-row" id="sr-${sid}" onclick="tSelectedId=${sid};tView='detail';renderTeacher()">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <div>
            <div class="sname">${STUDENTS[sid].name}</div>
            <div class="sid">ID: ${sid}</div>
          </div>
          <div class="overall-pct" style="color:${col}">${dones.length>0?avg+'%':'—'}</div>
        </div>
        <div class="sbars">
    `;
    SECTIONS.forEach(s=>{
      const pct=res[s.id]??null;
      const c=getColor(pct);
      html+=`
        <div class="sbar-item">
          <div class="sbl">${s.icon}</div>
          <div class="sbr"><div class="sbf" style="width:${pct??0}%;background:${c}"></div></div>
          <div class="sbp" style="color:${c}">${pct!==null?pct+'%':'—'}</div>
        </div>
      `;
    });
    html+=`</div>`;
    if(notDone.length>0){
      html+=`<div class="not-started">⚠️ Bajarilmagan: ${notDone.map(s=>s.icon+s.name).join(', ')}</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  document.getElementById('t-main').innerHTML=html;
}

function filterStudents(){
  const q=document.getElementById('t-search').value.toLowerCase();
  document.querySelectorAll('.student-row').forEach(row=>{
    const name=row.querySelector('.sname').textContent.toLowerCase();
    const id=row.querySelector('.sid').textContent.toLowerCase();
    row.style.display=(name.includes(q)||id.includes(q))?'':'none';
  });
}

function renderTDetail(){
  const sid=tSelectedId;
  const res=getResults()[sid]||{};
  const s=STUDENTS[sid];
  const dones=SECTIONS.filter(sec=>res[sec.id]!=null);
  const avg=dones.length>0?Math.round(dones.reduce((a,sec)=>a+res[sec.id],0)/dones.length):0;

  let html=`
    <button class="back-btn" onclick="tView='list';renderTeacher()">← Orqaga</button>
    <div class="stats-row">
      <div class="stat-pill gold"><span class="sv">${avg||'—'}${avg?'%':''}</span><span class="sl">Umumiy</span></div>
      <div class="stat-pill green"><span class="sv">${dones.length}/4</span><span class="sl">Bajarilgan</span></div>
    </div>
    <div class="detail-box">
      <div class="detail-title">👤 ${s.name} | ID: ${sid}</div>
  `;
  SECTIONS.forEach(sec=>{
    const pct=res[sec.id]??null;
    const col=getColor(pct);
    html+=`
      <div class="detail-row">
        <div class="detail-icon">${sec.icon}</div>
        <div class="detail-name">${sec.name}</div>
        ${pct!==null?`
          <div class="detail-bar"><div class="detail-fill" style="width:${pct}%;background:${col}"></div></div>
          <div class="detail-pct" style="color:${col}">${pct}%</div>
        `:`<div class="detail-not">Bajarilmagan</div>`}
      </div>
    `;
  });
  html+=`</div>`;
  document.getElementById('t-main').innerHTML=html;
}

function renderTLeaderboard(){
  const results=getResults();
  const sids=Object.keys(STUDENTS).filter(id=>!STUDENTS[id].teacher).map(Number);
  
  const ranked=sids.map(sid=>{
    const res=results[sid]||{};
    const dones=SECTIONS.filter(s=>res[s.id]!=null);
    const avg=dones.length>0?Math.round(dones.reduce((a,s)=>a+res[s.id],0)/dones.length):null;
    return {sid,avg,dones:dones.length,res};
  }).sort((a,b)=>{
    if(a.avg===null&&b.avg===null)return 0;
    if(a.avg===null)return 1;
    if(b.avg===null)return -1;
    return b.avg-a.avg;
  });

  let html=`<div style="margin-bottom:14px;font-size:.78rem;color:var(--muted)">Jami ${sids.length} o'quvchi • ${ranked.filter(r=>r.avg!==null).length} ta ishtirok etgan</div>`;
  
  ranked.forEach((r,i)=>{
    const rankClass=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const rankEmoji=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    const col=getColor(r.avg);
    html+=`
      <div class="lb-row" onclick="tSelectedId=${r.sid};tView='detail';renderTeacher()" style="cursor:pointer">
        <div class="lb-rank ${rankClass}">${rankEmoji}</div>
        <div style="flex:1">
          <div class="lb-name">${STUDENTS[r.sid].name}</div>
          <div class="lb-bars">
            ${SECTIONS.map(s=>`<div class="lb-dot" style="background:${getColor(r.res[s.id]??null)}" title="${s.name}"></div>`).join('')}
          </div>
        </div>
        <div class="lb-pct" style="color:${col}">${r.avg!==null?r.avg+'%':'—'}</div>
      </div>
    `;
  });
  document.getElementById('t-main').innerHTML=html;
}
